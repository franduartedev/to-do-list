<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">   
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>
    <h1>To do list</h1>
    <div class="container">
        <div class="input">
            <input type="text" placeholder="Agregar tarea" id="input">
            <button type="submit" id="btn"><i class="fa fa-plus"></i></button>
        </div>
        <div class="tasks">
            <ul>
            </ul>
        </div>
        <button type="submit" id="clear">Borrar tareas </button>
    </div>
    <script src="main.js"></script>
    
</body>
</html>
